name = "nexus-engine"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# Durable Object bindings
[[durable_objects.bindings]]
name = "GAME_DO"
class_name = "GameDO"

# Migrations (required for DO)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameDO"]

[vars]
# Admin secret for backend->engine auth
ADMIN_SECRET = "dev-secret-123"
# HS256 shared secret for JWT verification (must match backend NEXUS_ENGINE_JWT_SECRET)
JWT_SECRET = "dev-jwt-secret-change-me"
# LLM webhook endpoint (Backend's stateless LLM executor)
LLM_WEBHOOK_URL = "https://nexus.mzhh.xyz/api/v1/webhook/llm"
# Shared secret for Engine->Backend webhook auth
LLM_WEBHOOK_SECRET = "dev-secret-123"
