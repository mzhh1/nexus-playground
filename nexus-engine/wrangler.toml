name = "nexus-engine"
main = "src/index.ts"
compatibility_date = "2024-02-08"

# Durable Object bindings
[[durable_objects.bindings]]
name = "GAME_DO"
class_name = "GameDO"

[[durable_objects.bindings]]
name = "MONITOR_DO"
class_name = "MonitorDO"

# Migrations (required for DO)
[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameDO"]

[[migrations]]
tag = "v2"
new_sqlite_classes = ["MonitorDO"]

# Service Bindings for internal game workers (Optional for boost efficiency)
[[services]]
binding = "GAME_GOMOKU"
service = "gomoku-worker"

[[services]]
binding = "GAME_TIC_TAC_TOE"
service = "tic-tac-toe-worker"

[[services]]
binding = "GAME_UNO"
service = "uno-worker"

[[services]]
binding = "GAME_WEREWOLF"
service = "werewolf-worker"

[[services]]
binding = "GAME_XIANGQI"
service = "xiangqi-worker"

[[d1_databases]]
binding = "DB"
database_name = "np-engine-monitor-db"
database_id = "40e1e5aa-e360-4701-85d0-62716ce9ef3b"

[vars]
# Admin secret for backend/monitor->engine auth
#ADMIN_SECRET = "dev-admin-secret"
# HS256 shared secret for JWT verification
#JWT_SECRET = "dev-jwt-secret-change-me"
# Backend LLM webhook endpoint
#LLM_WEBHOOK_URL = "https://{base_url}/api/v1/webhook/llm"
# Shared secret for Engine -> Backend webhook auth
#LLM_WEBHOOK_SECRET = "dev-llm-secret"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1