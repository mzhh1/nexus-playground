worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream backend
    upstream backend {
        server backend:3000;
    }



    server {
        listen 80;
        server_name nexus.mzhh.xyz;
        
        # DNS Resolver for external domains
        resolver 8.8.8.8 valid=30s;

        # Client body size limit (for file uploads if needed)
        client_max_body_size 10M;

        # ============ Backend API Routes ============
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_http_version 1.1;
            
            # WebSocket & SSE support
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            
            # Proxy headers
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # SSE specific settings
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
            
            # CORS headers (allow frontend origin)
            add_header Access-Control-Allow-Origin $http_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Authorization, X-Client-Id, Content-Type, X-Request-Id" always;
            add_header Access-Control-Allow-Credentials "true" always;
            
            # Handle preflight requests
            if ($request_method = OPTIONS) {
                return 204;
            }
        }



        # ============ Frontend Routes (Proxy to Vercel) ============
        location / {
            proxy_pass https://np.mzhh.xyz;
            proxy_ssl_server_name on;
            proxy_set_header Host np.mzhh.xyz;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Vercel might redirect to https, ensure we follow or handle it
            # But since we are proxying https, it should be fine.
        }

        # ============ Health Check ============
        location /health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }

        # ============ Error Pages ============
        error_page 404 /404.html;
        error_page 500 502 503 504 /50x.html;
    }
}

