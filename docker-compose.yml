services:
  # ============================================
  # OAuth 示例业务应用（参考）
  # ============================================
  oauth-example-app:
    build:
      context: .
      dockerfile: ./oauth-example-app/Dockerfile
      args:
        VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL:-/api}
        VITE_DATA_BASE_URL: ${VITE_DATA_BASE_URL:-/data}
        VITE_POINTS_BASE_URL: ${VITE_POINTS_BASE_URL:-/points}
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID:-}
        VITE_OAUTH_REDIRECT_URI: ${VITE_OAUTH_REDIRECT_URI:-http://localhost/oauth-app/callback}
        VITE_OAUTH_PROFILE_URL: ${VITE_OAUTH_PROFILE_URL:-/auth/profile}
        VITE_OAUTH_SCOPE: ${VITE_OAUTH_SCOPE:-openid profile email data points llmapi}
        VITE_LLMAPI_BASE_URL: ${VITE_LLMAPI_BASE_URL:-/llmapi}
    container_name: autolab-oauth-example-app
    networks:
      - nexus-playground-network
    ports:
      - "${OAUTH_EXAMPLE_PORT:-51000}:51000"

  # ============================================
  # Nexus Playground - 主反向代理
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: nexus-nginx
    ports:
      - "${NEXUS_PORT:-80}:80"
    volumes:
      - ./nginx.conf.template:/etc/nginx/nginx.conf.template:ro
    depends_on:
      - portal
      - api-server
      - game-tic-tac-toe
    networks:
      - nexus-playground-network
    environment:
      - SERVER_NAME=${SERVER_NAME:-localhost}
    command: /bin/sh -c "envsubst '${SERVER_NAME}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

  # ============================================
  # Nexus Playground - 数据库
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - nexus-playground-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================
  # Nexus Playground - Redis（可选）
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    volumes:
      - redis_data:/data
    networks:
      - nexus-playground-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================
  # Nexus Playground - API Server
  # ============================================
  api-server:
    build:
      context: .
      dockerfile: ./core-framework/api-server/Dockerfile
    container_name: nexus-api-server
    environment:
      NODE_ENV: production
      API_SERVER_PORT: 4000
      API_SERVER_HOST: 0.0.0.0
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-password}@postgres:5432/${POSTGRES_DB:-nexus}
      REDIS_URL: redis://redis:6379
      CORS_ORIGIN: "*"
      VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL:-/api}
      VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID:-}
      OAUTH_CLIENT_SECRET: ${OAUTH_CLIENT_SECRET:-}
      VITE_LLMAPI_BASE_URL: ${VITE_LLMAPI_BASE_URL:-}
      LLMAPI_API_KEY: ${LLMAPI_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-playground-network

  # ============================================
  # Nexus Playground - 游戏门户
  # ============================================
  portal:
    build:
      context: .
      dockerfile: ./portal/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /ws
        VITE_AUTH_API_BASE_URL: ${VITE_AUTH_API_BASE_URL:-/api}
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID:-}
        VITE_OAUTH_REDIRECT_URI: ${VITE_OAUTH_REDIRECT_URI:-http://localhost/callback}
    container_name: nexus-portal
    networks:
      - nexus-playground-network

  # ============================================
  # Nexus Playground - 井字棋游戏
  # ============================================
  game-tic-tac-toe:
    build:
      context: .
      dockerfile: ./games/tic-tac-toe/ui/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_WS_URL: /ws
        VITE_AUTH_API_BASE_URL: /api
        VITE_OAUTH_CLIENT_ID: ${VITE_OAUTH_CLIENT_ID:-}
        VITE_OAUTH_REDIRECT_URI: ${NEXUS_OAUTH_REDIRECT_URI:-http://localhost/callback}
    container_name: nexus-game-tic-tac-toe
    networks:
      - nexus-playground-network

# ============================================
# 数据卷
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# 网络
# ============================================
networks:
  nexus-playground-network:
    driver: bridge
  
  

