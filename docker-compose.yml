version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_BASE_URL: ${AUTH_BASE_URL}
      JWT_ALG: ${JWT_ALG}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      AUTH_ISSUER: ${AUTH_ISSUER}
      OAUTH_USERINFO_PATH: ${OAUTH_USERINFO_PATH}
      OAUTH_USERINFO_TIMEOUT_MS: ${OAUTH_USERINFO_TIMEOUT_MS}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    volumes:
      - ./backend/src:/app/src
      - ./games:/app/games

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: nexus-frontend
    restart: unless-stopped
    environment:
      VITE_AUTH_API_BASE_URL: ${AUTH_BASE_URL}
      VITE_OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
      VITE_OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
      VITE_OAUTH_SCOPE: ${OAUTH_SCOPE}
      VITE_OAUTH_PROFILE_URL: ${OAUTH_PROFILE_URL}
      VITE_BACKEND_BASE_URL: /api/v1
      FRONTEND_PORT: ${FRONTEND_PORT}
      NGINX_PORT: ${NGINX_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/my-nexus.html:/app/my-nexus.html
      - ./frontend/room.html:/app/room.html
      - ./frontend/callback.html:/app/callback.html
      - ./games:/app/games

  # Nginx Gateway
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nexus-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:

