version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nexus-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend Service
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: nexus-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_PORT}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      AUTH_BASE_URL: ${AUTH_BASE_URL}
      JWT_ALG: ${JWT_ALG}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      AUTH_ISSUER: ${AUTH_ISSUER}
      OAUTH_USERINFO_PATH: ${OAUTH_USERINFO_PATH}
      OAUTH_USERINFO_TIMEOUT_MS: ${OAUTH_USERINFO_TIMEOUT_MS}
      # LLM 玩家功能所需（应用身份认证）
      OAUTH_APP_CLIENT_ID: ${OAUTH_APP_CLIENT_ID}
      OAUTH_APP_CLIENT_SECRET: ${OAUTH_APP_CLIENT_SECRET}
      LLMAPI_BASE_URL: ${LLMAPI_BASE_URL}
      SPECTATOR_ROLE_ID: ${SPECTATOR_ROLE_ID}
      GOMOKU_WORKER_URL: ${GOMOKU_WORKER_URL}
      NEXUS_ENGINE_URL: ${NEXUS_ENGINE_URL}
      NEXUS_ENGINE_ADMIN_SECRET: ${NEXUS_ENGINE_ADMIN_SECRET}
      NEXUS_ENGINE_JWT_SECRET: ${NEXUS_ENGINE_JWT_SECRET:-dev-jwt-secret-change-me}
      # Node.js 使用自定义 CA 证书
      NODE_EXTRA_CA_CERTS: /app/certs/ca.pem
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    volumes:
      - ./backend/src:/app/src
      - ./games/gomoku/dist:/app/game-assets/gomoku:ro
      - ./certs/ca.pem:/app/certs/ca.pem:ro

  # Frontend Service (Disabled - Proxying to Vercel)
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     target: development
  #   container_name: nexus-frontend
  #   restart: unless-stopped
  #   environment:
  #     VITE_AUTH_API_BASE_URL: ${AUTH_BASE_URL}
  #     VITE_OAUTH_CLIENT_ID: ${OAUTH_CLIENT_ID}
  #     VITE_OAUTH_REDIRECT_URI: ${OAUTH_REDIRECT_URI}
  #     VITE_OAUTH_SCOPE: ${OAUTH_SCOPE}
  #     VITE_OAUTH_PROFILE_URL: ${OAUTH_PROFILE_URL}
  #     VITE_BACKEND_BASE_URL: /api/v1
  #     VITE_SPECTATOR_ROLE_ID: ${SPECTATOR_ROLE_ID}
  #     FRONTEND_PORT: ${FRONTEND_PORT}
  #     NGINX_PORT: ${NGINX_PORT}
  #   ports:
  #     - "${FRONTEND_PORT}:${FRONTEND_PORT}"
  #   volumes:
  #     - ./frontend/src:/app/src
  #     - ./frontend/vite.config.ts:/app/vite.config.ts
  #     - ./frontend/index.html:/app/index.html
  #     - ./frontend/my-nexus.html:/app/my-nexus.html
  #     - ./frontend/room.html:/app/room.html
  #     - ./frontend/callback.html:/app/callback.html
  #     - ./games:/app/games

  # LLM Monitor Service
  llm-monitor:
    build:
      context: ./llm-monitor
      dockerfile: Dockerfile
      target: development
    container_name: nexus-llm-monitor
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      LLM_MONITOR_PORT: 5174
      VITE_MONITOR_BASE_PATH: /llm-monitor
      VITE_MONITOR_API_BASE_URL: /api/v1
      VITE_MONITOR_REFRESH_INTERVAL_MS: 5000
      VITE_MONITOR_PAGE_SIZE: 50
    ports:
      - "${LLM_MONITOR_PORT:-5174}:${LLM_MONITOR_PORT:-5174}"
    volumes:
      - ./llm-monitor/src:/app/src
      - ./llm-monitor/index.html:/app/index.html
      - ./llm-monitor/vite.config.ts:/app/vite.config.ts
      - ./llm-monitor/tsconfig.json:/app/tsconfig.json
      - ./llm-monitor/tsconfig.node.json:/app/tsconfig.node.json
      - ./llm-monitor/public:/app/public
      - ./llm-monitor/package.json:/app/package.json

  # Nginx Gateway
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nexus-nginx
    restart: unless-stopped
    extra_hosts:
      - "frontend:host-gateway"
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-51001}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_data:
  redis_data:

