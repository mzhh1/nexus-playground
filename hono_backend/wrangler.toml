name = "np-hono-backend"
main = "src/index.ts"
compatibility_date = "2024-02-01"

# Env vars for production: set in Cloudflare dashboard or via wrangler secret.
# Local: use .dev.vars (see .dev.vars.example)
[vars]

# Optional: LOG_LEVEL = "info"
CORS_ALLOW_ORIGINS = "frontend.url"



[[d1_databases]]
binding = "DB"
database_name = "np-hono-backend-db"
# Replace with real id after `wrangler d1 create`
# database_id = "your id"

[observability]
enabled = true
head_sampling_rate = 1

